<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nests Checker</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="page-checker" data-api-base="{{ .apiBase }}">
  <div class="checker-shell">
    <main class="checker-main">
      <div class="passport-card passport-center">
        <div class="passport-top">
          <div class="passport-mark">NESTS</div>
          <div class="passport-title">Checker Authorization</div>
          <div class="passport-chip"></div>
        </div>
        <div class="passport-meta">
          <div class="passport-field">
            <div class="passport-label">WINDOW ID</div>
            <div class="passport-value" data-wid></div>
          </div>
          <div class="passport-field">
            <div class="passport-label">ENV NAME</div>
            <div class="passport-value" data-name>-</div>
          </div>
          <div class="passport-field">
            <div class="passport-label">STATUS</div>
            <div class="passport-value" data-status-mini>WAITING</div>
          </div>
        </div>
        <div class="passport-mrz">
          <div class="mrz-line">NESTS&lt;&lt;CHECKER&lt;&lt;WINDOW&lt;AUTH&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</div>
          <div class="mrz-line">WID&lt;<span data-wid></span>&lt;ENV&lt;<span data-name>-</span>&lt;TTL&lt;<span data-timer>--:--</span></div>
        </div>
        <div class="passport-action">
          <div class="checker-icon"></div>
          <div class="checker-otp">
            <input type="text" placeholder="Google Auth Code" data-otp-input />
            <button class="btn ghost" data-otp-verify>Verify</button>
          </div>
          <div class="checker-form">
            <input type="password" placeholder="Global Key" data-gk-input disabled />
            <button class="btn primary" data-confirm disabled>Confirm</button>
          </div>
          <div class="checker-status" data-status>Waiting for confirmation</div>
          <div class="checker-warning">Warning, please confirm that the window was initiated by yourself.</div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" data-toast></div>

  <script src="/static/js/crypto.js"></script>
  <script src="/static/js/checker.js"></script>
</body>
</html>
